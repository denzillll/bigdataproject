version: 2

sources:
  # ──────────────────────────────────────────────────────────────
  # Bronze layer — raw replicas of the PostgreSQL OLTP tables from
  # Assignment 1, ingested into Databricks via Fivetran / Airbyte /
  # Debezium (whichever you pick in the architecture diagram).
  # Schema on Databricks: covid_analytics.bronze
  # ──────────────────────────────────────────────────────────────
  - name: bronze
    description: >
      Raw landing zone for the COVID-19 OLTP tables. Tables here are
      append-only replicas of PostgreSQL (`covid` schema) and should
      never be modified directly by analytics code. Ingestion is
      expected to add an `_ingested_at` timestamp to every row.
    database: workspace
    schema: bronze

    # Freshness rules tell dbt to fail the build if Bronze is stale.
    # Our OLTP refreshes daily, so anything older than 36h is a problem.
    freshness:
      warn_after: {count: 24, period: hour}
      error_after: {count: 36, period: hour}
    loaded_at_field: _ingested_at

    tables:
      - name: global_epidemiology
        identifier: covid__global_epidemiology
        description: >
          Daily COVID-19 epidemiological metrics per country from Our World
          in Data. One row per (location, date). Source: PostgreSQL
          `covid.global_epidemiology`. ~525k rows.
        columns:
          - name: id
            description: Surrogate primary key from PostgreSQL.
            tests:
              - unique
              - not_null
          - name: location
            description: Country or territory name.
            tests:
              - not_null
          - name: continent
            description: Continent — nullable for aggregate rows that slipped through.
          - name: date
            description: Reporting date.
            tests:
              - not_null
          - name: new_cases
          - name: new_deaths
          - name: total_cases
          - name: total_deaths
          - name: new_cases_per_million
          - name: new_deaths_per_million
          - name: total_vaccinations
          - name: people_vaccinated_per_hundred
          - name: population
          - name: gdp_per_capita
          - name: median_age
          - name: _ingested_at
            description: UTC timestamp the row landed in Bronze.

      - name: us_state_tracking
        identifier: covid__us_state_tracking
        description: >
          Daily US state-level hospital, ICU, test, and death tracking data
          from the COVID Tracking Project. One row per (state, date).
          Source: PostgreSQL `covid.us_state_tracking`. ~20k rows, coverage
          ends 2021-03-07.
        columns:
          - name: id
            tests:
              - unique
              - not_null
          - name: state
            description: Two-letter US state/territory code.
            tests:
              - not_null
          - name: date
            tests:
              - not_null
          - name: positive
          - name: negative
          - name: hospitalized_currently
          - name: hospitalized_cumulative
          - name: in_icu_currently
          - name: on_ventilator_currently
          - name: death
          - name: total_test_results
          - name: positive_rate

      - name: country_summary
        identifier: covid__country_summary
        description: >
          Per-country aggregate generated by a SQL `GROUP BY` in the OLTP
          pipeline. Not strictly needed in Bronze (we can rebuild it in dbt),
          but we land it anyway so we can cross-check our own aggregates
          against the source-of-truth aggregate.
        columns:
          - name: location
            tests:
              - unique
              - not_null
          - name: case_fatality_rate_pct
